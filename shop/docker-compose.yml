# Local Postgres for the demo shop. Port 5433 avoids clashing with any
# Postgres already on 5432.  Start:  docker compose up -d
services:
  db:
    image: postgres:16
    container_name: cvlsoft-shop-db
    environment:
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: shop
      POSTGRES_DB: shop
    ports:
      - "5433:5432"
    volumes:
      - shop_pgdata:/var/lib/postgresql/data

volumes:
  shop_pgdata:
