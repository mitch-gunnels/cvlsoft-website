<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="45%" stop-color="#0891b2" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#050a14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-accent" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#050a14" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="60%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="#050a14"/>
  <rect width="1584" height="396" fill="url(#grid)"/>

  <!-- Centered ambient glow -->
  <circle cx="792" cy="198" r="420" fill="url(#glow)"/>
  <!-- Corner accent glows: top-left and bottom-right -->
  <circle cx="120" cy="80" r="280" fill="url(#glow-accent)"/>
  <circle cx="1464" cy="316" r="280" fill="url(#glow-accent)"/>

  <!-- Eyebrow label -->
  <text x="792" y="138" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="15" fill="#22d3ee" letter-spacing="6" font-weight="500" opacity="0.85">
    AIOS by Cognitive Venture Labs
  </text>

  <!-- Tagline (two lines) -->
  <text x="792" y="212" text-anchor="middle" font-family="'Manrope', system-ui, sans-serif" font-size="54" font-weight="300" fill="#e2e8f0" letter-spacing="-1.5">
    Stop building AI Agents.
  </text>
  <text x="792" y="276" text-anchor="middle" font-family="'Manrope', system-ui, sans-serif" font-size="54" font-weight="300" letter-spacing="-1.5" xml:space="preserve"><tspan fill="#e2e8f0">Start building </tspan><tspan fill="url(#textgrad)">Intelligence.</tspan></text>

  <!-- Sub-line -->
  <text x="792" y="326" text-anchor="middle" font-family="'Manrope', system-ui, sans-serif" font-size="20" fill="#94a3b8" font-weight="300" letter-spacing="0.2">
    An operating system for autonomous intelligence.
  </text>
</svg>
