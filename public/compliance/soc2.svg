<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 90" fill="none">
  <!-- Circular seal -->
  <g transform="translate(45 45)">
    <circle cx="0" cy="0" r="34" stroke="#ffffff" stroke-width="2" fill="none"/>
    <circle cx="0" cy="0" r="27" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.6"/>
    <!-- Small dots around the inner ring -->
    <g fill="#ffffff" opacity="0.7">
      <circle cx="0" cy="-30" r="0.9"/>
      <circle cx="21" cy="-21" r="0.9"/>
      <circle cx="30" cy="0" r="0.9"/>
      <circle cx="21" cy="21" r="0.9"/>
      <circle cx="0" cy="30" r="0.9"/>
      <circle cx="-21" cy="21" r="0.9"/>
      <circle cx="-30" cy="0" r="0.9"/>
      <circle cx="-21" cy="-21" r="0.9"/>
    </g>
    <!-- Stylized check inside -->
    <path d="M-10 1 L-2 9 L11 -7" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Text block -->
  <text x="92" y="32" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="18" font-weight="800" letter-spacing="1" fill="#ffffff">SOC 2</text>
  <text x="92" y="52" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="14" font-weight="800" letter-spacing="1" fill="#ffffff">TYPE II</text>
  <text x="92" y="72" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="11" font-weight="600" letter-spacing="2" fill="#ffffff">CERTIFIED</text>
</svg>
