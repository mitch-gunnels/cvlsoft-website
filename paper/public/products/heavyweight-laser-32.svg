<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" width="900" height="900" role="img" aria-label="Heavyweight Laser">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfaf7"/>
      <stop offset="1" stop-color="#ecefe8"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="900" height="900" fill="url(#bg)"/>
  <ellipse cx="455" cy="788" rx="240" ry="34" fill="#15233a" opacity="0.10"/>

  <!-- top face -->
  <polygon points="270,230 560,230 620,180 330,180" fill="#fbfbf9" stroke="#979795" stroke-width="2" stroke-linejoin="round"/>
  <!-- right face (ream thickness) -->
  <polygon points="560,230 620,180 620,710 560,760" fill="#cececb" stroke="#979795" stroke-width="2" stroke-linejoin="round"/>
  <line x1="560.0" y1="230.0" x2="560.0" y2="760.0" stroke="#c4c4c1" stroke-width="2" opacity="0.5"/><line x1="566.7" y1="224.4" x2="566.7" y2="754.4" stroke="#c4c4c1" stroke-width="2" opacity="0.5"/><line x1="573.3" y1="218.9" x2="573.3" y2="748.9" stroke="#c4c4c1" stroke-width="2" opacity="0.5"/><line x1="580.0" y1="213.3" x2="580.0" y2="743.3" stroke="#c4c4c1" stroke-width="2" opacity="0.5"/><line x1="586.7" y1="207.8" x2="586.7" y2="737.8" stroke="#c4c4c1" stroke-width="2" opacity="0.5"/><line x1="593.3" y1="202.2" x2="593.3" y2="732.2" stroke="#c4c4c1" stroke-width="2" opacity="0.5"/><line x1="600.0" y1="196.7" x2="600.0" y2="726.7" stroke="#c4c4c1" stroke-width="2" opacity="0.5"/><line x1="606.7" y1="191.1" x2="606.7" y2="721.1" stroke="#c4c4c1" stroke-width="2" opacity="0.5"/><line x1="613.3" y1="185.6" x2="613.3" y2="715.6" stroke="#c4c4c1" stroke-width="2" opacity="0.5"/>
  <!-- front face -->
  <rect x="270" y="230" width="290" height="530" fill="#fbfbf8" stroke="#979795" stroke-width="2"/>
  <rect x="270" y="230" width="290" height="530" fill="url(#sheen)"/>

  <!-- brand band -->
  <rect x="270" y="284" width="290" height="74" fill="#1b3c6e"/>
  <text x="415" y="319" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="23" font-weight="700" letter-spacing="1.6" fill="#ffffff">DUNDER MIFFLIN</text>
  <text x="415" y="344" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" letter-spacing="4" fill="#ffffff" opacity="0.72">PAPER COMPANY, INC.</text>

  

  <!-- product name -->
  <text x="415" y="466" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="600" fill="#15233a"><tspan x="415" dy="0">Heavyweight</tspan><tspan x="415" dy="42">Laser</tspan></text>

  <!-- color name -->
  <text x="415" y="558" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#5d6675">Ultra White</text>

  <!-- format / weight chip -->
  <rect x="305" y="690" width="220" height="38" rx="19" fill="#1b3c6e" opacity="1"/>
  <text x="415" y="715" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5" fill="#ffffff">32 LB  ·  500 / REAM</text>
</svg>
